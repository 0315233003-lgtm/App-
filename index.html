<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinary Cuisine - Recipe Sharing</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header with Profile and Search -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>Culinary Cuisine</h1>
            </div>
            <div class="search-container">
                <input type="text" placeholder="Search for recipes..." class="search-bar">
                <button class="search-btn">Search</button>
            </div>
            <div class="profile">
                <img src="sarah.jpg" alt="Profile" class="profile-pic">
                <span class="username">Chef Sarah</span>
            </div>
        </div>
    </header>

    <main class="main-content">
    <section class="top-rated">
    <h2>Top Rated Recipes</h2>
    <div class="recipe-grid">
        <!-- Recipe cards will be added by JavaScript -->
    </div>
        </section>


    </main>

    <script src="script.js"></script>
</body>
</html>
