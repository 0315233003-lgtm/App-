<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinary Cuisine - Recipe Sharing</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header with Profile and Search -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>Culinary Cuisine</h1>
            </div>
            <div class="search-container">
                <input type="text" placeholder="Search for recipes..." class="search-bar">
                <button class="search-btn">Search</button>
            </div>
            <div class="profile">
                <img src="sarah.jpg" alt="Profile" class="profile-pic">
                <span class="username">Chef Sarah</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Top Rated Section -->
            <section class="top-rated">
                <h2>Top Rated Recipes</h2>
                <div class="recipe-grid">
                    <div class="recipe-card">
                        <img src="creamy_carbonara.jpg" alt="Pasta Carbonara" class="recipe-image">
                        <div class="recipe-info">
                            <h3 class="recipe-title">Creamy Pasta Carbonara</h3>
                            <div class="recipe-meta">
                                <span class="rating">⭐ 4.8</span>
                                <span class="cook-time">🕐 25 min</span>
                            </div>
                        </div>
                    </div>

                    <div class="recipe-card">
                        <img src="tikkamasala.jpg" alt="Spicy Chicken Masala" class="recipe-image">
                        <div class="recipe-info">
                            <h3 class="recipe-title">Spicy Chicken Tikka Masala</h3>
                            <div class="recipe-meta">
                                <span class="rating">⭐ 4.7</span>
                                <span class="cook-time">🕐 45 min</span>
                            </div>
                        </div>
                    </div>

                    <div class="recipe-card">
                        <img src="chocolatecake.jpg" alt="Chocolate Cake" class="recipe-image">
                        <div class="recipe-info">
                            <h3 class="recipe-title">Rich Chocolate Cake</h3>
                            <div class="recipe-meta">
                                <span class="rating">⭐ 4.9</span>
                                <span class="cook-time">🕐 60 min</span>
                            </div>
                        </div>
                    </div>

                    <div class="recipe-card">
                        <img src="cesarsalad.jpg" alt="Caesar Salad" class="recipe-image">
                        <div class="recipe-info">
                            <h3 class="recipe-title">Classic Caesar Salad</h3>
                            <div class="recipe-meta">
                                <span class="rating">⭐ 4.6</span>
                                <span class="cook-time">🕐 15 min</span>
                            </div>
                        </div>
                    </div>
                    <div class="recipe-card">
                        <img src="seafood.jpg" alt="Cajun sea food boil" class="recipe-image">
                        <div class="recipe-info">
                            <h3 class="recipe-title">Cajun Seafood Boil</h3>
                            <div class="recipe-meta">
                                <span class="rating">⭐ 4.6</span>
                                <span class="cook-time">🕐 15 min</span>
                            </div>
                        </div>
                    </div>
                         <div class="recipe-card">
                        <img src="chicken-flautas.jpg" alt="Chicken Flautas" class="recipe-image">
                        <div class="recipe-info">
                            <h3 class="recipe-title"> Mexican Chicken Flautas</h3>
                            <div class="recipe-meta">
                                <span class="rating">⭐ 4.6</span>
                                <span class="cook-time">🕐 15 min</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
